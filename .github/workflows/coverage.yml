name: coverage

on:
  workflow_dispatch:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential qt6-base-dev qt6-base-dev-tools qt6-declarative-dev python3-pip
          pip install gcovr
      - name: Run coverage gate (>=80%)
        run: ./scripts/run_coverage.sh
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            build-coverage/coverage.xml
            build-coverage/coverage.html
