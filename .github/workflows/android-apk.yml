name: android-apk

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential unzip curl

      - name: Bootstrap Android + Qt toolchain
        run: |
          ./scripts/bootstrap_android_env.sh "$RUNNER_TEMP/android-env" > "$RUNNER_TEMP/android-env-vars.sh"
          cat "$RUNNER_TEMP/android-env-vars.sh" >> "$GITHUB_ENV"

      - name: Build APK (unsigned)
        env:
          QT_ANDROID_DIR: ${{ env.QT_ANDROID_DIR }}
          QT_HOST_PATH: ${{ env.QT_HOST_PATH }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
        run: ./scripts/build_android_apk.sh release

      - name: Collect APK
        run: |
          mkdir -p dist
          cp build-android/android-build/build/outputs/apk/release/*.apk dist/ || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: loopprofit-apk
          path: dist/*.apk

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
