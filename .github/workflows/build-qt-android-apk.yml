name: Build Qt Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - work
      - qt-android-build
    paths:
      - '.github/workflows/build-qt-android-apk.yml'
      - 'CMakeLists.txt'
      - 'src/**'
      - 'qml/**'
      - 'scripts/**'
      - 'docs/**'
      - 'README.md'

jobs:
  build-qt-android-apk:
    runs-on: ubuntu-24.04
    env:
      QT_VERSION: 6.7.3
      QT_BASE_DIR: ${{ github.workspace }}/../qt
      QT_HOST_PATH: ${{ github.workspace }}/../qt/Qt/6.7.3/gcc_64
      QT_ANDROID_CMAKE_PREFIX: ${{ github.workspace }}/../qt/Qt/6.7.3/android_arm64_v8a
      QT_ANDROID_TOOLCHAIN_FILE: ${{ github.workspace }}/../qt/Qt/6.7.3/android_arm64_v8a/lib/cmake/Qt6/qt.toolchain.cmake
      ANDROID_ABI: arm64-v8a

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK cmdline tools
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.3.11579264"
          yes | sdkmanager --licenses >/dev/null

      - name: Install Qt desktop host tools
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: gcc_64
          dir: ${{ env.QT_BASE_DIR }}
          modules: qtdeclarative
          install-deps: true

      - name: Install Qt Android kit
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_arm64_v8a
          dir: ${{ env.QT_BASE_DIR }}
          modules: qtdeclarative
          install-deps: false

      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore "$GITHUB_WORKSPACE/release.jks" \
            -storepass loopprofit123 \
            -keypass loopprofit123 \
            -alias loopprofit \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=LoopProfit, OU=OpenAI, O=OpenAI, L=San Francisco, ST=CA, C=US"

      - name: Check Qt Android environment
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264
        run: ./scripts/check_android_env.sh

      - name: Build signed Qt Android release APK
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          KEY_ALIAS: loopprofit
          KEYSTORE_PASS: loopprofit123
          KEY_PASS: loopprofit123
        run: ./scripts/build_android_release_apk.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: loopprofit-qt-android-apk
          path: |
            build-android-release/**/*.apk
            !build-android-release/**/*unsigned.apk
          if-no-files-found: error
